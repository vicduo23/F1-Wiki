<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 百科</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8002D;--red2:#ff1a45;--black:#07070a;--bg:#0c0c10;
  --panel:#111116;--card:#17171d;--card2:#1e1e26;--border:#22222e;--border2:#2e2e3e;
  --text:#ededf0;--muted:#6a6a7a;--dim:#38384a;--gold:#f5c842;--blue:#1e8fff;--green:#00c96a;
  --nav-h:52px;--tab-h:44px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--black);color:var(--text);font-family:'Noto Sans SC',sans-serif;display:flex;flex-direction:column}

/* ── GRID BG ── */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,0,45,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,0,45,0.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}

/* ── TOPBAR ── */
.topbar{height:var(--nav-h);display:flex;align-items:center;border-bottom:1px solid var(--border);background:rgba(7,7,10,0.97);backdrop-filter:blur(12px);position:relative;z-index:100;flex-shrink:0}
.logo{background:var(--red);height:100%;display:flex;align-items:center;padding:0 20px 0 16px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:3px;color:#fff;clip-path:polygon(0 0,100% 0,88% 100%,0 100%);padding-right:32px;flex-shrink:0}
.logo-sub{padding:0 20px;font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.logo-sub span{color:var(--text)}
.topbar-right{margin-left:auto;padding-right:16px;display:flex;align-items:center;gap:8px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{background:var(--card);border:1px solid var(--border2);color:var(--text);padding:7px 36px 7px 12px;font-family:'Noto Sans SC',sans-serif;font-size:12px;outline:none;width:200px;border-radius:2px;transition:border-color .2s}
.search-input:focus{border-color:var(--red);width:260px}
.search-input::placeholder{color:var(--dim)}
.search-btn{position:absolute;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0}
.season-badge{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:5px 12px}

/* ── TABS ── */
.tabs{height:var(--tab-h);display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--panel);position:relative;z-index:99;flex-shrink:0;padding:0 4px}
.tab{display:flex;align-items:center;gap:7px;padding:0 18px;height:100%;background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:color .15s;position:relative;border-bottom:2px solid transparent}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.tab .t-icon{font-size:15px}
.tab-count{font-size:10px;background:var(--card2);border:1px solid var(--border);padding:1px 6px;border-radius:10px;color:var(--dim)}

/* ── LAYOUT ── */
.app{flex:1;display:flex;overflow:hidden;position:relative;z-index:1}
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;display:flex;flex-direction:column}
.main-area{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ── SIDEBAR ── */
.sb-section{padding:12px 0 4px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding:0 14px 8px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent;font-family:'Noto Sans SC',sans-serif}
.sb-item:hover{color:var(--text);background:var(--card)}
.sb-item.active{color:var(--text);background:var(--card);border-left-color:var(--red)}
.sb-item .si-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.sb-item .si-sub{font-size:10px;color:var(--dim);display:block;line-height:1.3}
.sb-item .si-badge{margin-left:auto;font-size:9px;background:var(--red);color:#fff;padding:1px 5px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px}
.sb-divider{height:1px;background:var(--border);margin:8px 14px}

/* ── DETAIL PANEL ── */
.detail{flex:1;padding:24px 28px}
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.detail-color-bar{width:4px;height:60px;border-radius:2px;flex-shrink:0;margin-top:4px}
.detail-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;line-height:1.2}
.detail-sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border:1px solid;border-radius:1px}
.tag-red{color:var(--red);border-color:rgba(232,0,45,.3);background:rgba(232,0,45,.07)}
.tag-gold{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.07)}
.tag-blue{color:var(--blue);border-color:rgba(30,143,255,.3);background:rgba(30,143,255,.07)}
.tag-green{color:var(--green);border-color:rgba(0,201,106,.3);background:rgba(0,201,106,.07)}
.tag-gray{color:var(--muted);border-color:var(--border2);background:var(--card2)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red)}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

/* ── SECTIONS ── */
.section{margin-bottom:22px}
.section-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border:1px solid var(--border)}
.info-row .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.info-row .v{font-size:12px;font-weight:500;text-align:right}
.driver-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.driver-card{background:var(--card);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
.driver-card .d-num{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:var(--border2);position:absolute;right:12px;top:8px;line-height:1}
.driver-card .d-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px}
.driver-card .d-nat{font-size:11px;color:var(--muted);margin-top:2px}
.driver-card .d-stat{margin-top:10px;font-size:11px;color:var(--dim)}
.driver-card .d-stat span{color:var(--text);font-weight:500}

/* ── NEWS ── */
.news-btn{display:flex;align-items:center;gap:8px;background:var(--red);border:none;color:#fff;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:background .15s;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);margin-bottom:16px}
.news-btn:hover{background:#c50025}
.news-btn:disabled{background:var(--dim);cursor:not-allowed}
.news-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:14px 16px;margin-bottom:8px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.news-item .n-src{font-size:10px;font-family:'Rajdhani',sans-serif;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:4px}
.news-item .n-title{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:6px}
.news-item .n-body{font-size:12px;color:var(--muted);line-height:1.7}
.news-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:16px 0}
.dots span{display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;margin:0 2px;animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── CIRCUIT SVG ── */
.circuit-svg-wrap{background:var(--card);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center;min-height:220px}
.circuit-svg-wrap svg{width:100%;height:auto;display:block}
.circuit-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--dim);gap:8px}
.circuit-placeholder .cp-icon{font-size:36px;opacity:0.3}

/* ── KNOWLEDGE ── */
.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.know-card{background:var(--card);border:1px solid var(--border);padding:16px;cursor:pointer;transition:all .15s;border-top:2px solid transparent}
.know-card:hover{background:var(--card2);border-top-color:var(--red)}
.know-card.active{background:var(--card2);border-top-color:var(--red)}
.know-card .kc-icon{font-size:22px;margin-bottom:8px;opacity:.8}
.know-card .kc-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px}
.know-card .kc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.know-detail{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:18px 20px}
.know-detail .kd-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:var(--red2);margin-bottom:12px}
.know-detail .kd-body{font-size:13px;line-height:1.85;color:#ccc}
.kd-body strong{color:var(--text);font-weight:500}
.kd-body .hl{background:rgba(232,0,45,.08);border-left:2px solid var(--red);padding:10px 14px;margin:10px 0;font-size:12px;color:#ddd;line-height:1.7}
.kd-body .fc{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border2);padding:3px 9px;font-size:11px;margin:3px;color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px}

/* ── WELCOME ── */
.welcome-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--muted)}
.wp-icon{font-size:48px;opacity:.25;margin-bottom:16px}
.wp-title{font-family:'Rajdhani',sans-serif;font-size:20px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.wp-sub{font-size:13px;line-height:1.7;max-width:320px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── CALENDAR GRID ── */
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.cal-card{background:var(--card);border:1px solid var(--border);padding:12px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.cal-card:hover{background:var(--card2);border-left-color:var(--red)}
.cal-card.active{background:var(--card2);border-left-color:var(--red)}
.cal-card .cc-round{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.cal-card .cc-name{font-size:13px;font-weight:500;margin-top:3px}
.cal-card .cc-date{font-size:11px;color:var(--muted);margin-top:2px}
.cal-card .cc-badge{display:inline-block;font-size:9px;background:rgba(30,143,255,.15);color:var(--blue);border:1px solid rgba(30,143,255,.25);padding:1px 6px;margin-top:4px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px}
.cal-card .cc-badge.new{background:rgba(232,0,45,.15);color:var(--red2);border-color:rgba(232,0,45,.25)}

/* ── TEAM GRID for overview ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.team-overview-card{background:var(--card);border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:all .15s;border-top:3px solid;position:relative;overflow:hidden}
.team-overview-card:hover{background:var(--card2)}
.team-overview-card .tc-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.team-overview-card .tc-engine{font-size:11px;color:var(--muted);margin-bottom:8px}
.team-overview-card .tc-pts{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text)}
.team-overview-card .tc-pts-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.team-overview-card .tc-pos{position:absolute;right:12px;top:10px;font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--border2)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">F1</div>
  <div class="logo-sub"><span>百科</span> · WIKI</div>
  <div class="topbar-right">
    <div class="search-wrap">
      <input class="search-input" id="global-search" placeholder="搜索车队、赛道、车手..." oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">⌕</button>
    </div>
    <div class="season-badge">2026 · 赛季进行中</div>
    <button onclick="openSettings()" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:6px 12px;cursor:pointer;font-size:13px;margin-left:8px;transition:color .15s" title="设置 API Key" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">⚙</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--border2);border-top:3px solid var(--red);padding:28px;width:460px;max-width:92vw">
    <div style="font-family:Rajdhani,sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;margin-bottom:18px">⚙ API KEY 设置</div>

    <div style="font-size:11px;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">
      TAVILY KEY · 负责实时搜索
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">
      获取地址：<a href="https://app.tavily.com" target="_blank" style="color:var(--blue)">app.tavily.com</a>
      · 免费 1000次/月 · 格式 <span style="font-family:monospace;color:var(--muted)">tvly-...</span>
    </div>
    <input id="tavily-key-input" type="password" placeholder="tvly-xxxxxxxxxxxxxxxx"
      style="width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:10px 14px;font-size:13px;outline:none;margin-bottom:4px;font-family:monospace;border-radius:2px"
      oninput="checkTavilyKey(this.value)">
    <div id="tavily-key-status" style="font-size:11px;margin-bottom:18px;height:14px"></div>

    <div style="font-size:11px;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">
      DEEPSEEK KEY · 负责整理输出
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">
      获取地址：<a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--blue)">platform.deepseek.com</a>
      · 极低费用约¥0.02/次 · 格式 <span style="font-family:monospace;color:var(--muted)">sk-...</span>
    </div>
    <input id="api-key-input" type="password" placeholder="sk-xxxxxxxxxxxxxxxx"
      style="width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:10px 14px;font-size:13px;outline:none;margin-bottom:4px;font-family:monospace;border-radius:2px"
      oninput="checkKey(this.value)">
    <div id="key-status" style="font-size:11px;margin-bottom:20px;height:14px"></div>

    <div style="font-size:11px;color:var(--dim);margin-bottom:16px;padding:10px 12px;background:var(--card);border-left:2px solid var(--border2)">
      🔒 两个 Key 均只保存在<strong style="color:var(--text)">本地浏览器</strong>中，不经过任何服务器
    </div>

    <div style="display:flex;gap:10px">
      <button onclick="saveKey()" style="flex:1;background:var(--red);border:none;color:#fff;padding:11px;font-family:Rajdhani,sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer">保存</button>
      <button onclick="clearKey()" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:11px 16px;font-family:Rajdhani,sans-serif;font-size:13px;cursor:pointer">清除全部</button>
      <button onclick="closeSettings()" style="background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:11px 16px;font-family:Rajdhani,sans-serif;font-size:13px;cursor:pointer">取消</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('teams')" id="tab-teams"><span class="t-icon">🏎️</span> 车队 <span class="tab-count">11</span></button>
  <button class="tab" onclick="switchTab('circuits')" id="tab-circuits"><span class="t-icon">🏁</span> 赛道 <span class="tab-count">22</span></button>
  <button class="tab" onclick="switchTab('knowledge')" id="tab-knowledge"><span class="t-icon">📖</span> 科普</button>
  <button class="tab" onclick="switchTab('news')" id="tab-news"><span class="t-icon">📡</span> 资讯 <span class="tab-count" id="news-badge" style="color:var(--red)">LIVE</span></button>
</div>

<!-- APP -->
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>
  <!-- MAIN -->
  <div class="main-area" id="main-area">
    <div class="welcome-panel" id="welcome">
      <div class="wp-icon">🏎️</div>
      <div class="wp-title">F1 百科全书</div>
      <div class="wp-sub">选择左侧任意条目查看详情，或切换顶部标签页浏览不同分类</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const TEAMS = {
  redbull:{name:'Red Bull Racing',color:'#3671C6',engine:'Honda RBPT',base:'Milton Keynes, UK',founded:2005,
    chassis:'RB21',power:'Honda RBPT 006',
    drivers:[
      {num:1,name:'Max Verstappen',nat:'🇳🇱 荷兰',dob:'1997.09.30',champs:4,

       stats:{races:'200+',wins:'62',poles:'40+',podiums:'110+'}},
      {num:22,name:'Liam Lawson',nat:'🇳🇿 新西兰',dob:'2002.02.11',champs:0,
       bio:'新西兰车手，红牛青训出身，2023/2024赛季多次顶替受伤车手出赛表现亮眼，2026年获得正式席位。',
       stats:{races:'15+',wins:'0',poles:'0',podiums:'0'}}

  {id:'aero',icon:'🌀',title:'空气动力学',sub:'下压力 · 阻力 · 气流',
    body:`F1赛车通过<strong>前翼、后翼、扩散器</strong>产生向下压力，让轮胎获得超强抓地力，得以在弯道以极高速度行驶。<br><br>

    body:`现行制度（2010年至今）：前10名得分，外加最快圈速额外1分。<br><br>
    <span class="fc">P1: 25</span><span class="fc">P2: 18</span><span class="fc">P3: 15</span><span class="fc">P4: 12</span><span class="fc">P5: 10</span><span class="fc">P6: 8</span><span class="fc">P7: 6</span><span class="fc">P8: 4</span><span class="fc">P9: 2</span><span class="fc">P10: 1</span><span class="fc" style="color:var(--gold)">最快圈: +1</span><br><br>
    <div class="hl"><strong>车手冠军（WDC）</strong>：年度个人总积分最高，获世界车手冠军奖杯<br><strong>车队冠军（WCC）</strong>：两位车手积分之和最高，决定商业收入分配<br><strong>冲刺赛积分</strong>：前8名得分 8-7-6-5-4-3-2-1，2026年共6站冲刺赛</div>
    <strong>历史制度</strong>：最初只有前5名得分（8-6-4-3-2），积分制多次演变，每次变革都影响赛季格局。`},
  {id:'drs',icon:'📡',title:'DRS → 主动气动',sub:'超车辅助系统演变',
    body:`<strong>DRS（2011-2025）</strong>：后翼可动翼片在指定区域打开，减少阻力，直线速度提升约10-15km/h，帮助后车超车。激活条件：距前车1秒内+进入DRS检测区。<br><br>
    <div class="hl"><strong>2026年革命：DRS退场</strong>，替换为"主动空气动力学（Active Aero）"——前后翼根据行驶状态自动调节，弯道高下压力，直道低阻力，无需驾驶员手动操作。<br><strong>超车模式（Overtake Mode）</strong>：后车距前车1秒内进入指定区域，可使用更多ERS电力，效果类似但更自然。</div>
    <strong>为什么废除DRS</strong>：DRS被批过于机械，导致"公路超车"失去驾驶对决戏剧性。主动空气动力学旨在让超车更自然。<span class="fc">2026起无DRS</span><span class="fc">主动空气动力学</span>`},
  {id:'safety',icon:'🛡️',title:'安全系统',sub:'Halo · HANS · 生存单元',
    body:`F1安全技术经历数十年演进，现代F1几乎杜绝了致命事故。<br><br>
    <div class="hl"><strong>Halo（光环）2018年引入</strong>：钛合金头部保护，可承受12吨静压力，已多次救命：Grosjean 2020巴林火焰事故、Zhou 2022英国翻车、Leclerc 2022奥地利碎片<br><strong>HANS装置</strong>：头颈支撑系统，防止碰撞时颈椎损伤<br><strong>碳纤维Monocoque</strong>：吸能生存舱，设计用于在高速碰撞中保持乘员完好<br><strong>FIA医疗车</strong>：全程跟随，任何事故点45秒内必须到达</div>
    <span class="fc">Halo承重12吨</span><span class="fc">防火服耐700°C</span><span class="fc">头盔耐冲击800G</span>`},
  {id:'2026reg',icon:'📐',title:'2026年全新规则',sub:'F1技术革命年',
    body:`2026年是F1技术史上变化最大的年份，底盘和动力单元全部重新设计。<br><br>
    <div class="hl"><strong>动力单元</strong>：移除MGU-H，电动功率占比约50%，全部使用100%可持续燃料<br><strong>空气动力学</strong>：主动空气动力学取代DRS，车身更小更轻（目标车重约768kg）<br><strong>新制造商</strong>：Audi首次以厂队参战，Ford与红牛合作，Honda以RBPT名义继续<br><strong>新车队</strong>：Cadillac加入成第11队，2016年Haas以来首支新队</div>
    <strong>地面效应保留</strong>：2022年引入的地面效应规则继续，有助于赛车跟车。<strong>冲刺赛格式</strong>：保持6站冲刺，格式微调。<span class="fc">新动力单元</span><span class="fc">无DRS</span><span class="fc">100%可持续燃料</span>`},
  {id:'pitstop',icon:'🔧',title:'维修站进站',sub:'2秒换4条轮胎的艺术',
    body:`F1维修站进站是全球最精密的团队协作之一，约<strong>20人同时工作</strong>，在2-3秒内完成4条轮胎更换。<br><br>
    <div class="hl"><strong>进站流程</strong>：赛车减速驶入→前顶车手抬起车身→左右轮胎工（各3人：气枪×1+轮胎×2）同时工作→换完信号灯变绿→车手油门离开<br><strong>人员分工</strong>：前后顶车各1人、左右各3人（共12人换胎）、稳定手、前后翼调整、灭火员、监察等约20人</div>
    <strong>最快记录</strong>：1.82秒（红牛车队，2023年）<br>
    <strong>失误惩罚</strong>：轮胎未锁紧脱落、过早落车等可导致罚款甚至禁赛，安全是最高优先级。<span class="fc">最快1.82秒</span><span class="fc">约20人协作</span><span class="fc">失误=安全事故</span>`},
  {id:'quali',icon:'⏱️',title:'排位赛制度',sub:'Q1/Q2/Q3淘汰赛制',
    body:`F1采用三段淘汰制排位赛（Qualifying），决定正赛发车顺序。<br><br>
    <div class="hl"><strong>Q1（18分钟）</strong>：全部20辆赛车参赛，最慢5辆淘汰（P16-P20）<br><strong>Q2（15分钟）</strong>：剩余15辆参赛，最慢5辆淘汰（P11-P15）<br><strong>Q3（12分钟）</strong>：10辆争夺杆位，决定P1-P10</div>
    <strong>关键规定</strong>：Q2中使用的轮胎必须在正赛起步时继续使用（影响策略）。<br>
    <strong>冲刺赛周末</strong>：有额外的Sprint Qualifying（冲刺排位赛），决定100km冲刺赛的发车顺序，独立于正赛排位赛。<span class="fc">Q3 10辆争杆位</span><span class="fc">Q2轮胎规定影响策略</span>`},
  {id:'groundeffect',icon:'🔮',title:'地面效应',sub:'2022规则核心：腹部产生下压力',
    body:`地面效应是2022年F1规则变革的核心，通过车底产生大量下压力，而非依赖翼片。<br><br>
    <div class="hl"><strong>工作原理</strong>：车底设计成文丘里形通道，气流从前部进入后加速，在车底产生大面积低压区，将车"吸"在地面。效率极高：同等下压力所产生的阻力远小于翼片。<br><strong>好处</strong>：跟车时受"dirty air"（尾流）影响大幅减少，让超车更容易，2022年超车次数创历史新高。</div>
    <strong>"弹跳"问题（Porpoising）</strong>：2022年初各车队出现高速弹跳，因地面效应产生的低压使车底抬离地面→失去下压力→车底回落→循环往复。通过调高离地间隙解决。<span class="fc">2022年引入</span><span class="fc">2026年保留</span><span class="fc">超车次数大幅提升</span>`},
  {id:'overtaking',icon:'💨',title:'超车技术',sub:'刹车点 · 跟车 · Slipstream',
    body:`F1超车是技术与心理的双重博弈，不同类型超车需要不同技术。<br><br>
    <div class="hl"><strong>刹车超车</strong>：在制动区刹车比前车更晚入弯（"out-braking"），用更快入弯速度超越。高风险：刹车过晚会冲出赛道。<br><strong>滑流超车（Slipstream）</strong>：跟随前车进入其气流低压区，阻力减少→速度更快→直道末端超越。长直道常见。<br><strong>双重指定（Double Duty）</strong>：同时利用滑流+超车模式，在直道末端以速度优势进攻。</div>
    <strong>防守策略</strong>：车手只允许变线一次防守（若已变线，被攻方不得再次变线），违规视为阻挡。<span class="fc">只允许变线一次防守</span><span class="fc">早刹+弯内超车</span>`},
  {id:'history',icon:'📜',title:'F1历史重要时刻',sub:'从1950到2026年',
    body:`F1世界锦标赛自1950年首届，经历了无数传奇时刻：<br><br>
    <div class="hl">1950 — 银石首届，Farina夺冠<br>1976 — Lauda/Hunt史诗对决，"Rush"原型<br>1984 — Senna vs Prost梅赛德斯内战<br>1994 — Senna在圣马力诺离世，F1安全革命<br>2000-04 — Schumacher/Ferrari五连冠<br>2008 — Hamilton最后一个弯夺冠（圣保罗）<br>2010-13 — Vettel/RedBull四连冠<br>2021 — 最终圈争议，Verstappen vs Hamilton<br>2022 — 地面效应新规，Verstappen首冠<br>2025 — Norris夺冠，McLaren 28年后重回巅峰</div>
    <span class="fc">76年历史</span><span class="fc">1950年首届</span><span class="fc">逾千位车手参赛</span>`},
  {id:'glossary',icon:'📖',title:'F1术语词典',sub:'常见专业词汇解释',
    body:`<div class="hl"><strong>Undercut/Overcut</strong>：提前/延迟进站的策略行为<br><strong>Porpoising</strong>：地面效应导致的赛车高速弹跳<br><strong>Dirty Air</strong>：前车产生的湍流，影响后车下压力<br><strong>Marbles</strong>：轮胎磨损碎屑，积聚在赛道边缘，极滑<br><strong>Graining</strong>：轮胎表面颗粒化，使用不当的早期磨损<br><strong>Blistering</strong>：轮胎起泡，高温下橡胶脱层<br><strong>Safety Car/VSC</strong>：安全车/虚拟安全车<br><strong>Parc Fermé</strong>：比赛前封闭区域，禁止调整赛车<br><strong>Drag</strong>：阻力；<strong>Downforce</strong>：下压力<br><strong>ERS</strong>：能量回收系统<br><strong>DNF</strong>：Did Not Finish，未完赛<br><strong>DNS</strong>：Did Not Start，未起步</div>
    <span class="fc">滑流 Slipstream</span><span class="fc">内外线 Inside/Outside</span><span class="fc">清洁空气 Clean Air</span>`},
];

// ══════════════════════════════════════════
// AI NEWS FETCHER — Tavily搜索 + DeepSeek整理
// ══════════════════════════════════════════
async function callAI(prompt, outputEl) {
  const tavilyKey = localStorage.getItem('f1_tavily_key') || '';
  const deepseekKey = localStorage.getItem('f1_api_key') || '';

  if (!tavilyKey || !deepseekKey) {
    outputEl.innerHTML = `<div class="news-item" style="border-left-color:var(--gold)">
      <div class="n-src" style="color:var(--gold)">⚙ 需要配置</div>
      <div class="n-title">请先设置 Tavily + DeepSeek API Key</div>
      <div class="n-body">点击右上角 ⚙ 按钮，填入两个 Key 即可启用实时资讯功能。Key 只存储在本地浏览器中。</div>
    </div>`;
    return;
  }

  // Step 1: Tavily 搜索
  outputEl.innerHTML = `<div class="news-loading"><div class="dots"><span></span><span></span><span></span></div><span>正在搜索最新资讯...</span></div>`;
  let searchResults = '';
  try {
    const tRes = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: tavilyKey,
        query: prompt.replace(/请搜索|请提供|关于/g, '').trim() + ' F1 2026',
        max_results: 5,
        include_answer: false,
        search_depth: 'basic'
      })
    });
    const tData = await tRes.json();
    searchResults = (tData.results || [])
      .map(r => `标题：${r.title}\n来源：${r.url}\n内容：${r.content}`)
      .join('\n\n---\n\n');
  } catch (e) {
    searchResults = '（搜索暂时不可用，使用模型已有知识回答）';
  }

  // Step 2: DeepSeek 整理
  outputEl.innerHTML = `<div class="news-loading"><div class="dots"><span></span><span></span><span></span></div><span>正在整理分析...</span></div>`;
  try {
    const dRes = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + deepseekKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 1200,
        messages: [
          {
            role: 'system',
            content: `你是F1资讯编辑，负责根据搜索结果整理成结构化资讯卡片。
输出格式严格按照：每条用<N><SRC>来源</SRC><TITLE>标题（15字内）</TITLE><BODY>正文（80-120字，有具体数据）</BODY></N>包裹，输出3-5条。
如果搜索结果不足，用已知的F1知识补充。用中文输出，语言简洁专业。`
          },
          {
            role: 'user',
            content: `用户问题：${prompt}\n\n搜索结果：\n${searchResults}\n\n请整理成资讯卡片输出。`
          }
        ]
      })
    });
    const dData = await dRes.json();
    const text = dData.choices?.[0]?.message?.content || '';
    const items = [...text.matchAll(/<N><SRC>(.*?)<\/SRC><TITLE>(.*?)<\/TITLE><BODY>([\s\S]*?)<\/BODY><\/N>/g)];
    if (items.length) {
      outputEl.innerHTML = items.map((m, i) => `
        <div class="news-item" style="animation-delay:${i * .08}s">
          <div class="n-src">${m[1]}</div>
          <div class="n-title">${m[2]}</div>
          <div class="n-body">${m[3]}</div>
        </div>`).join('');
    } else {
      outputEl.innerHTML = `<div class="news-item"><div class="n-body" style="color:var(--muted)">${text || '暂无结果，请稍后重试。'}</div></div>`;
    }
  } catch (e) {
    outputEl.innerHTML = `<div class="news-item"><div class="n-body" style="color:var(--red)">⚠ DeepSeek 连接失败，请检查 Key 或网络</div></div>`;
  }
}

function onSearch(v) {}
function doSearch() {
  const q = document.getElementById('global-search').value.trim().toLowerCase();
  if (!q) return;
  // Try teams
  for (const [k,t] of Object.entries(TEAMS)) {
    if (t.name.toLowerCase().includes(q) || t.drivers.some(d=>d.name.toLowerCase().includes(q))) {
      switchTab('teams'); setTimeout(()=>showTeam(k), 50); return;
    }
  }
  // Try circuits
  for (const c of CIRCUITS_2026) {
    if (c.name.toLowerCase().includes(q) || c.circuit.toLowerCase().includes(q)) {
      switchTab('circuits'); setTimeout(()=>showCircuit(c.key), 50); return;
    }
  }
  // Try knowledge
  for (const k of KNOWLEDGE) {
    if (k.title.toLowerCase().includes(q)) {
      switchTab('knowledge'); setTimeout(()=>showKnowledge(k.id), 50); return;
    }
  }
}

function openSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.style.display = 'flex';
  document.getElementById('tavily-key-input').value = localStorage.getItem('f1_tavily_key') || '';
  document.getElementById('api-key-input').value = localStorage.getItem('f1_api_key') || '';
  checkTavilyKey(document.getElementById('tavily-key-input').value);
  checkKey(document.getElementById('api-key-input').value);
}
function closeSettings() {
  document.getElementById('settings-overlay').style.display = 'none';
}
function saveKey() {
  const tavilyVal = document.getElementById('tavily-key-input').value.trim();
  const deepseekVal = document.getElementById('api-key-input').value.trim();
  if (tavilyVal) localStorage.setItem('f1_tavily_key', tavilyVal);
  if (deepseekVal) localStorage.setItem('f1_api_key', deepseekVal);
  updateTopbarKeyStatus();
  closeSettings();
}
function clearKey() {
  localStorage.removeItem('f1_tavily_key');
  localStorage.removeItem('f1_api_key');
  document.getElementById('tavily-key-input').value = '';
  document.getElementById('api-key-input').value = '';
  document.getElementById('tavily-key-status').textContent = '';
  document.getElementById('key-status').textContent = '';
  updateTopbarKeyStatus();
}
function checkTavilyKey(val) {
  const el = document.getElementById('tavily-key-status');
  if (!el) return;
  if (!val) { el.textContent = ''; return; }
  if (val.startsWith('tvly-')) { el.textContent = '✓ 格式正确'; el.style.color = 'var(--green)'; }
  else { el.textContent = '⚠ 应以 tvly- 开头'; el.style.color = 'var(--gold)'; }
}
function checkKey(val) {
  const el = document.getElementById('key-status');
  if (!el) return;
  if (!val) { el.textContent = ''; return; }
  if (val.startsWith('sk-')) { el.textContent = '✓ 格式正确'; el.style.color = 'var(--green)'; }
  else { el.textContent = '⚠ 应以 sk- 开头'; el.style.color = 'var(--gold)'; }
}
function updateKeyStatus(val) {}
function updateTopbarKeyStatus() {
  const hasKeys = !!localStorage.getItem('f1_tavily_key') && !!localStorage.getItem('f1_api_key');
  const hasSome = !!localStorage.getItem('f1_tavily_key') || !!localStorage.getItem('f1_api_key');
  const btn = document.querySelector('button[onclick="openSettings()"]');
  if (btn) btn.style.color = hasKeys ? 'var(--green)' : hasSome ? 'var(--gold)' : 'var(--muted)';
}
document.getElementById('settings-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
